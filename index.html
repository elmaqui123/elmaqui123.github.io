<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMAQUI TECH | Tienda Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #000; --accent: #2b6cb0; --bg-light: #f9fafb; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1a1a1a; }
        
        /* Navbar y Buscador */
        .announcement-bar { background: var(--primary); color: white; text-align: center; padding: 8px; font-size: 13px; }
        .navbar { border-bottom: 1px solid #eee; padding: 15px 0; background: white; }
        .search-container { position: relative; width: 300px; }
        .search-input { border-radius: 20px; padding-left: 35px; border: 1px solid #ddd; }
        .search-icon { position: absolute; left: 12px; top: 10px; color: #888; }

        /* Hero */
        .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1587202372775-e229f172b9d7?q=80&w=2000&auto=format&fit=crop'); 
                height: 60vh; background-size: cover; background-position: center; display: flex; align-items: center; color: white; }

        /* Tarjetas de Producto */
        .product-card { border: none; transition: 0.3s; height: 100%; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .img-wrapper { background: var(--bg-light); height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .img-wrapper img { max-width: 80%; max-height: 80%; object-fit: contain; transition: 0.4s; }
        .product-card:hover img { transform: scale(1.1); }
        
        /* Carrito Lateral (Offcanvas) */
        .cart-item { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .cart-item img { width: 50px; height: 50px; object-fit: contain; margin-right: 15px; }
        .cart-count-badge { background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; position: absolute; top: -5px; right: -10px; }

        .btn-black { background: black; color: white; border-radius: 0; padding: 10px 20px; border: none; text-transform: uppercase; font-weight: 600; }
        .btn-black:hover { background: #333; }
    </style>
</head>
<body>

    <div class="announcement-bar">✈️ ENVÍO GRATIS A TODO EL PERÚ POR LANZAMIENTO</div>

    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-3" href="#">ELMAQUI TECH</a>
            
            <div class="search-container d-none d-md-block">
                <i class="fa fa-search search-icon"></i>
                <input type="text" id="searchInput" class="form-control search-input" placeholder="Buscar productos..." onkeyup="filterProducts()">
            </div>

            <div class="d-flex align-items-center">
                <button class="btn position-relative me-3" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
                    <i class="fa fa-shopping-cart fs-4"></i>
                    <span id="cartCount" class="cart-count-badge">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="hero text-center text-md-start">
        <div class="container">
            <h1 class="display-3 fw-bold">EL PODER DE LA RTX 3090</h1>
            <p class="fs-4">Arma tu setup con componentes de élite.</p>
            <button class="btn btn-light btn-lg mt-3 fw-bold">VER OFERTAS</button>
        </div>
    </header>

    <section class="container my-5">
        <h2 class="fw-bold mb-4">Productos Destacados</h2>
        <div class="row g-4" id="productGrid">
            </div>
    </section>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar">
        <div class="offcanvas-header border-bottom">
            <h5 class="fw-bold">TU CARRITO</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div id="cartItemsContainer">
                <p class="text-center text-muted mt-5">Tu carrito está vacío.</p>
            </div>
            <div class="mt-4 border-top pt-3">
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Total:</span>
                    <span id="cartTotal">S/ 0.00</span>
                </div>
                <button class="btn btn-black w-100 mt-3" onclick="checkout()">FINALIZAR COMPRA</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // BASE DE DATOS DE PRODUCTOS
        const products = [
            { id: 1, name: "NVIDIA RTX 3090 24GB", price: 5499, img: "https://m.media-amazon.com/images/I/71uK-V3M-qL._AC_SL1500_.jpg", cat: "GPU" },
            { id: 2, name: "Teclado Mecánico RGB Blanco", price: 320, img: "https://m.media-amazon.com/images/I/61S9A6X+X7L._AC_SL1500_.jpg", cat: "Perifericos" },
            { id: 3, name: "Mouse Gamer Pro Wireless", price: 180, img: "https://m.media-amazon.com/images/I/71YyOat6OAL._AC_SL1500_.jpg", cat: "Perifericos" },
            { id: 4, name: "Monitor 4K 144Hz Gamer", price: 2150, img: "https://m.media-amazon.com/images/I/81shshV9S3L._AC_SL1500_.jpg", cat: "Monitores" },
            { id: 5, name: "Procesador Intel i9-13900K", price: 2400, img: "https://m.media-amazon.com/images/I/61bL89NXunL._AC_SL1500_.jpg", cat: "CPU" }
        ];

        let cart = [];

        // 1. MOSTRAR PRODUCTOS
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="col-md-4 col-lg-3">
                    <div class="card product-card">
                        <div class="img-wrapper">
                            <img src="${p.img}" alt="${p.name}">
                        </div>
                        <div class="card-body text-center">
                            <h6 class="fw-bold">${p.name}</h6>
                            <p class="text-primary fw-bold">S/ ${p.price.toFixed(2)}</p>
                            <button class="btn btn-black btn-sm w-100" onclick="addToCart(${p.id})">Añadir al carrito</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 2. BUSCADOR FUNCIONAL
        function filterProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        // 3. CARRITO FUNCIONAL
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItemsContainer');
            const totalEl = document.getElementById('cartTotal');
            const countEl = document.getElementById('cartCount');
            
            countEl.innerText = cart.length;

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-muted mt-5">Tu carrito está vacío.</p>';
                totalEl.innerText = "S/ 0.00";
                return;
            }

            container.innerHTML = cart.map((p, index) => `
                <div class="cart-item">
                    <img src="${p.img}">
                    <div class="flex-grow-1">
                        <small class="d-block fw-bold">${p.name}</small>
                        <small>S/ ${p.price.toFixed(2)}</small>
                    </div>
                    <button class="btn btn-sm text-danger" onclick="removeFromCart(${index})"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((sum, p) => sum + p.price, 0);
            totalEl.innerText = `S/ ${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function checkout() {
            if(cart.length === 0) return alert("El carrito está vacío.");
            alert("¡Gracias por tu compra! Redirigiendo a pasarela de pago (Simulado)");
            cart = [];
            updateCartUI();
        }

        // Inicializar
        renderProducts(products);
    </script>
</body>
</html>
