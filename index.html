<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMAQUI TECH | Rendimiento Sin Precedentes</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --main: #0071e3; --dark: #000; --card: #161617; }
        body { background-color: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HERO */
        .hero { 
            position: relative; height: 100vh; width: 100%; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; background-color: #000;
        }
        #bgVideo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%; width: auto; height: auto; object-fit: cover; z-index: 1;
        }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2; }
        .hero-content { position: relative; z-index: 3; text-align: center; }
        .hero-title { font-size: clamp(3.5rem, 12vw, 7.5rem); font-weight: 900; letter-spacing: -5px; line-height: 0.85; }

        /* PRODUCTOS */
        .section-padding { padding: 80px 0; }
        .product-card {
            background: var(--card); border: 1px solid #333; border-radius: 30px;
            padding: 30px; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); cursor: pointer; height: 100%;
        }
        .product-card:hover { transform: scale(1.05); border-color: var(--main); box-shadow: 0 20px 40px rgba(0, 113, 227, 0.2); }
        .img-box { height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden; border-radius: 15px; background: #222; }
        .img-box img { max-height: 100%; width: 100%; object-fit: cover; }

        /* MODAL DETALLES */
        .modal-content { background: #1c1c1e; border-radius: 30px; border: 1px solid #333; color: white; }
        .modal-header { border-bottom: 1px solid #333; }
        .modal-body img { border-radius: 20px; width: 100%; height: 100%; object-fit: cover; max-height: 400px; }
        .spec-label { color: var(--main); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; display: block; }
        .spec-value { font-size: 1.1rem; margin-bottom: 15px; display: block; }

        /* FOOTER Y OTROS */
        footer { background: #080808; padding: 60px 0 20px; border-top: 1px solid #222; }
        .accent-color { color: var(--main); }
        .wsp-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            width: 65px; height: 65px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 35px;
            color: white; z-index: 9999;
        }
    </style>
</head>
<body>

    <a href="https://wa.me/51933589431" class="wsp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <nav class="navbar sticky-top navbar-dark bg-dark bg-opacity-75 backdrop-blur shadow">
        <div class="container py-2">
            <a class="navbar-brand fw-black fs-2" href="#">ELMAQUI <span class="accent-color">TECH</span></a>
            <button class="btn btn-link position-relative text-white p-0" data-bs-toggle="offcanvas" data-bs-target="#cart">
                <i class="fa-solid fa-cart-shopping fs-4"></i>
                <span id="cCount" class="cart-count badge bg-primary rounded-pill" style="position: absolute; top: -10px; right: -10px;">0</span>
            </button>
        </div>
    </nav>

    <section class="hero">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="68dd4cb3-3662-4731-bdbf-c54a2c9c171b_watermark.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">ROMPE LAS<br>REGLAS.</h1>
            <a href="#store" class="btn btn-primary rounded-pill px-5 py-3 mt-4 fw-bold">EXPLORAR TIENDA</a>
        </div>
    </section>

    <section id="store" class="section-padding container">
        <h2 class="display-4 fw-black text-center mb-5">ARMAMENTO ELITE</h2>
        <div class="row g-4" id="pGrid"></div>
    </section>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="mTitle">Detalles</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <img id="mImg" src="" alt="Producto">
                        </div>
                        <div class="col-md-6">
                            <div id="mSpecs"></div>
                            <h3 class="accent-color fw-bold mt-3" id="mPrice"></h3>
                            <button class="btn btn-primary w-100 mt-4 rounded-pill fw-bold" id="mAddBtn">AÑADIR AL ARSENAL</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <h3 class="fw-bold mb-4">ELMAQUI <span class="accent-color">TECH</span></h3>
            <p class="text-secondary">&copy; 2024 ELMAQUI TECH. +51 933 589 431</p>
        </div>
    </footer>

    <div class="offcanvas offcanvas-end bg-dark text-white" id="cart">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="fw-bold m-0">TU ARSENAL</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cItems"></div>
            <div class="mt-auto pt-4 border-top">
                <div class="d-flex justify-content-between fs-3 fw-bold mb-4">
                    <span>Total</span><span id="cTotal">S/ 0</span>
                </div>
                <button class="btn btn-primary w-100 py-3 rounded-pill" onclick="sendWsp()">COMPRAR POR WHATSAPP</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const prods = [
            { 
                id: 1, name: "SteelSeries Apex 7 TKL", price: 79.0, img: "teclado con ia 2.jpg",
                specs: { "Medidas": "355 x 139 x 40 mm", "Interruptores": "Mecánicos Brown", "Iluminación": "RGB Tecla a Tecla", "Material": "Aleación de Aluminio" }
            },
            { 
                id: 2, name: "Pad Gamer Pro XL", price: 23.9, img: "https://images.unsplash.com/photo-1629429464243-7e3e97014197?q=80&w=600",
                specs: { "Medidas": "900 x 400 x 4 mm", "Superficie": "Micro-tejido Speed", "Base": "Goma Antideslizante", "Bordes": "Costura Reforzada" }
            },
            { 
                id: 3, name: "Mouse Gaming Pro", price: 69.9, img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=600",
                specs: { "Medidas": "125 x 63 x 40 mm", "Sensor": "Hero 25K DPI", "Peso": "63g Ultra Ligero", "Botones": "6 Programables" }
            },
            { 
                id: 4, name: "Monitor 240Hz OLED", price: 459.9, img: "https://images.unsplash.com/photo-1527443154391-507e9dc6c5cc?q=80&w=600",
                specs: { "Resolución": "4K Nativo (3840x2160)", "Frecuencia": "240Hz", "Panel": "OLED Quantum Dot", "Tiempo de Respuesta": "0.03ms GtG" }
            }
        ];

        let myCart = [];

        function render() {
            document.getElementById('pGrid').innerHTML = prods.map(p => `
                <div class="col-md-6 col-lg-3">
                    <div class="product-card text-center" onclick="showDetail(${p.id})">
                        <div class="img-box"><img src="${p.img}" alt="${p.name}"></div>
                        <h4 class="fw-bold mb-1">${p.name}</h4>
                        <p class="accent-color fs-4 fw-bold">S/ ${p.price.toFixed(2)}</p>
                        <small class="text-secondary">Ver más detalles</small>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(id) {
            const p = prods.find(x => x.id === id);
            document.getElementById('mTitle').innerText = p.name;
            document.getElementById('mImg').src = p.img;
            document.getElementById('mPrice').innerText = `S/ ${p.price.toFixed(2)}`;
            
            let specsHtml = '';
            for (const [key, value] of Object.entries(p.specs)) {
                specsHtml += `<span class="spec-label">${key}</span><span class="spec-value">${value}</span>`;
            }
            document.getElementById('mSpecs').innerHTML = specsHtml;
            
            document.getElementById('mAddBtn').onclick = () => { add(p.id); bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); };
            
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }

        function add(id) {
            myCart.push(prods.find(x => x.id === id));
            update();
        }

        function update() {
            document.getElementById('cCount').innerText = myCart.length;
            document.getElementById('cItems').innerHTML = myCart.map((p, i) => `
                <div class="d-flex justify-content-between mb-3 p-3 bg-secondary bg-opacity-10 rounded-4">
                    <span>${p.name}</span>
                    <button class="btn btn-sm btn-danger" onclick="myCart.splice(${i},1);update()">×</button>
                </div>
            `).join('');
            document.getElementById('cTotal').innerText = `S/ ${myCart.reduce((s, p) => s + p.price, 0).toFixed(2)}`;
        }

        function sendWsp() {
            let msg = "¡Hola ELMAQUI TECH! Mi pedido:%0A" + myCart.map(p => `• ${p.name}`).join('%0A');
            window.open(`https://wa.me/51933589431?text=${msg}%0ATotal: ${document.getElementById('cTotal').innerText}`);
        }

        render();
    </script>
</body>
</html>
