<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Pro - Estilo Coolbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #ff0000; } /* Rojo tipo Coolbox */
        .hero { background: #f8f9fa; padding: 60px 0; text-align: center; }
        .card-product { transition: 0.3s; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-product:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">MI TECH STORE</a>
            <input type="text" class="form-control w-50" placeholder="Buscar productos...">
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="display-4 fw-bold">Ofertas de Locura</h1>
            <p class="lead">Lo último en tecnología con mi RTX 3090</p>
            <button class="btn btn-primary btn-lg">Ver Catálogo</button>
        </div>
    </header>

    <div class="container my-5">
        <div class="row g-4">
            <div class="col-md-3">
                <div class="card card-product p-3 text-center">
                    <img src="https://via.placeholder.com/200" class="img-fluid mb-3">
                    <h5 class="fw-bold">Laptop Gamer</h5>
                    <p class="text-danger fw-bold">S/ 4,500.00</p>
                    <button class="btn btn-outline-dark btn-sm">Añadir al carrito</button>
                </div>
            </div>
            </div>
    </div>

</body>
</html>
