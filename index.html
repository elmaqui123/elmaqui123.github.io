<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMAQUI TECH | Rendimiento Sin Precedentes</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --main: #0071e3; --dark: #000; --card: #161617; }
        body { background-color: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .hero { 
            position: relative; height: 100vh; width: 100%; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; background-color: #000;
        }
        #bgVideo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%; width: auto; height: auto; object-fit: cover; z-index: 1;
        }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2; }
        .hero-content { position: relative; z-index: 3; text-align: center; }
        .hero-title { font-size: clamp(3.5rem, 12vw, 7.5rem); font-weight: 900; letter-spacing: -5px; line-height: 0.85; }

        .section-padding { padding: 100px 0; }
        .feature-img { border-radius: 40px; width: 100%; height: 500px; object-fit: cover; border: 1px solid #333; }
        .accent-color { color: var(--main); }

        .product-card {
            background: var(--card); border: 1px solid #333; border-radius: 30px;
            padding: 25px; transition: 0.5s; cursor: pointer; height: 100%;
        }
        .product-card:hover { transform: scale(1.05); border-color: var(--main); box-shadow: 0 20px 40px rgba(0, 113, 227, 0.2); }
        .img-box { height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden; border-radius: 15px; background: #111; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .modal-content { background: #1c1c1e; border-radius: 30px; border: 1px solid #333; color: white; padding: 20px; }
        .modal-body img { border-radius: 20px; width: 100%; height: 350px; object-fit: contain; background: #111; padding: 10px; }
        .spec-label { color: var(--main); font-weight: bold; text-transform: uppercase; font-size: 0.75rem; display: block; margin-top: 10px; }
        .spec-value { font-size: 1rem; color: #ccc; display: block; margin-bottom: 5px; }

        footer { background: #080808; padding: 40px 0; border-top: 1px solid #222; }
        .wsp-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            width: 65px; height: 65px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 35px; color: white; z-index: 9999;
        }
    </style>
</head>
<body>

    <a href="https://wa.me/51933589431" class="wsp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <nav class="navbar sticky-top navbar-dark bg-dark bg-opacity-75 backdrop-blur shadow">
        <div class="container py-2">
            <a class="navbar-brand fw-black fs-2" href="#">ELMAQUI <span class="accent-color">TECH</span></a>
        </div>
    </nav>

    <section class="hero">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="68dd4cb3-3662-4731-bdbf-c54a2c9c171b_watermark.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">ROMPE LAS<br>REGLAS.</h1>
            <a href="#store" class="btn btn-primary rounded-pill px-5 py-3 mt-4 fw-bold">EXPLORAR TIENDA</a>
        </div>
    </section>

    <section class="section-padding container">
        <div class="row align-items-center g-5">
            <div class="col-lg-6" data-aos="fade-right">
                <h2 class="display-3 fw-bold mb-4">No vendemos piezas,<br><span class="accent-color">vendemos poder.</span></h2>
                <p class="fs-5 text-secondary">En ELMAQUI TECH seleccionamos cada componente para que tu setup sea imparable.</p>
                <div class="d-flex gap-4 mt-4 text-center">
                    <div><h3 class="fw-bold accent-color mb-0">8000Hz</h3><small>POLLING RATE</small></div>
                    <div><h3 class="fw-bold accent-color mb-0">100%</h3><small>ANTI-GHOSTING</small></div>
                    <div><h3 class="fw-bold accent-color mb-0">100M</h3><small>CLICKS VIDA</small></div>
                </div>
            </div>
            <div class="col-lg-6" data-aos="fade-left">
                <img src="teclado con ia.jpg" class="feature-img shadow-lg" alt="Setup Gaming">
            </div>
        </div>
    </section>

    <section id="store" class="section-padding container">
        <h2 class="display-4 fw-bold text-center mb-5">ARMAMENTO <span class="accent-color">ELITE</span></h2>
        <div class="row g-4" id="pGrid"></div>
    </section>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="row g-4">
                        <div class="col-md-6"><img id="mImg" src="" alt="Producto"></div>
                        <div class="col-md-6">
                            <h3 class="fw-bold" id="mTitle"></h3>
                            <div id="mSpecs"></div>
                            <h2 class="accent-color fw-bold mt-3" id="mPrice"></h2>
                            <button class="btn btn-primary w-100 mt-3 py-3 rounded-pill fw-bold">AÑADIR AL ARSENAL</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer><div class="container text-center"><p class="text-secondary">&copy; 2024 ELMAQUI TECH. +51 933 589 431</p></div></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const prods = [
            { id: 1, name: "SteelSeries Apex 7 TKL", price: 79.0, img: "teclado con ia 2.jpg", specs: { "Switches": "Mechanical Brown", "Pantalla": "OLED Smart", "Medidas": "355x139x40mm" } },
            { id: 2, name: "Pad Gamer Pro XL", price: 23.9, img: "http://googleusercontent.com/image_collection/image_retrieval/6582303276521495560_0", specs: { "Superficie": "Micro-tejido Speed", "Medidas": "900x400x4mm", "Base": "Antideslizante" } },
            { id: 3, name: "Mouse Gaming Pro", price: 69.9, img: "http://googleusercontent.com/image_collection/image_retrieval/7997407450422759326_0", specs: { "Sensor": "Hero 25K DPI", "Peso": "63g Ultra Ligero", "Botones": "7 Programables" } },
            { id: 4, name: "Monitor 240Hz OLED", price: 459.9, img: "http://googleusercontent.com/image_collection/image_retrieval/16822785771965528772_0", specs: { "Resolución": "4K Ultra HD", "Frecuencia": "240Hz Nativo", "Panel": "OLED Quantum Dot" } }
        ];

        function render() {
            document.getElementById('pGrid').innerHTML = prods.map(p => `
                <div class="col-md-6 col-lg-3">
                    <div class="product-card text-center" onclick="showDetail(${p.id})">
                        <div class="img-box"><img src="${p.img}"></div>
                        <h5 class="fw-bold mb-1">${p.name}</h5>
                        <p class="accent-color fs-5 fw-bold mb-0">S/ ${p.price.toFixed(2)}</p>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(id) {
            const p = prods.find(x => x.id === id);
            document.getElementById('mTitle').innerText = p.name;
            document.getElementById('mImg').src = p.img;
            document.getElementById('mPrice').innerText = `S/ ${p.price.toFixed(2)}`;
            document.getElementById('mSpecs').innerHTML = Object.entries(p.specs).map(([k,v]) => `<span class="spec-label">${k}</span><span class="spec-value">${v}</span>`).join('');
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }
        render();
    </script>
</body>
</html>
