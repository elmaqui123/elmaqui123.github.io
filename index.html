<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMAQUI TECH | Rendimiento Sin Precedentes</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --main: #0071e3; --dark: #000; --card: #161617; }
        body { background-color: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HERO CON VIDEO */
        .hero { 
            position: relative; height: 100vh; width: 100%; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; background-color: #000;
        }
        #bgVideo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%; width: auto; height: auto; object-fit: cover; z-index: 1;
        }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2; }
        .hero-content { position: relative; z-index: 3; text-align: center; }
        .hero-title { font-size: clamp(3.5rem, 12vw, 7.5rem); font-weight: 900; letter-spacing: -5px; line-height: 0.85; }

        .section-padding { padding: 80px 0; }
        .feature-img { border-radius: 40px; width: 100%; height: 500px; object-fit: cover; border: 1px solid #333; }
        .accent-color { color: var(--main); }

        /* PRODUCTOS */
        .product-card {
            background: var(--card); border: 1px solid #333; border-radius: 30px;
            padding: 30px; transition: 0.5s; cursor: pointer; height: 100%;
        }
        .product-card:hover { transform: scale(1.05); border-color: var(--main); }
        .img-box { height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 15px; background: #111; overflow: hidden; }
        .img-box img { max-height: 95%; max-width: 95%; object-fit: contain; }

        /* MODAL */
        .modal-content { background: #1c1c1e; border-radius: 30px; border: 1px solid #333; color: white; padding: 20px; }
        .modal-body img { border-radius: 20px; width: 100%; height: 300px; object-fit: contain; background: #111; margin-bottom: 20px; }
        .spec-item { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .spec-label { color: var(--main); font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }

        .wsp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; z-index: 9999; }
        .cart-count { background: var(--main); color: white; border-radius: 50px; padding: 2px 8px; font-size: 12px; position: absolute; top: -5px; right: -5px; }
    </style>
</head>
<body>

    <a href="https://wa.me/51933589431" class="wsp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <nav class="navbar sticky-top navbar-dark bg-dark bg-opacity-75 shadow">
        <div class="container py-2">
            <a class="navbar-brand fw-bold fs-2" href="#">ELMAQUI <span class="accent-color">TECH</span></a>
            <button class="btn btn-link position-relative text-white p-0" data-bs-toggle="offcanvas" data-bs-target="#cart">
                <i class="fa-solid fa-cart-shopping fs-4"></i>
                <span id="cCount" class="cart-count">0</span>
            </button>
        </div>
    </nav>

    <section class="hero">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="68dd4cb3-3662-4731-bdbf-c54a2c9c171b_watermark.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content" data-aos="zoom-out">
            <h1 class="hero-title">ROMPE LAS<br>REGLAS.</h1>
            <a href="#store" class="btn btn-primary rounded-pill px-5 py-3 mt-4 fw-bold">EXPLORAR TIENDA</a>
        </div>
    </section>

    <section class="section-padding container">
        <div class="row align-items-center g-5">
            <div class="col-lg-6" data-aos="fade-right">
                <h2 class="display-3 fw-bold mb-4">No vendemos piezas,<br><span class="accent-color">vendemos poder.</span></h2>
                <p class="fs-5 text-secondary">En ELMAQUI TECH seleccionamos cada componente para que tu setup sea imparable.</p>
                <div class="d-flex gap-4 mt-4 text-center">
                    <div><h3 class="fw-bold accent-color mb-0">8000Hz</h3><small>POLLING RATE</small></div>
                    <div><h3 class="fw-bold accent-color mb-0">100%</h3><small>ANTI-GHOSTING</small></div>
                    <div><h3 class="fw-bold accent-color mb-0">100M</h3><small>CLICKS VIDA</small></div>
                </div>
            </div>
            <div class="col-lg-6" data-aos="fade-left">
                <img src="teclado con ia.jpg" class="feature-img shadow-lg" alt="Setup">
            </div>
        </div>
    </section>

    <section id="store" class="section-padding bg-dark">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="display-4 fw-bold mb-3">ARMAMENTO ELITE</h2>
            </div>
            <div class="row g-4" id="pGrid"></div>
        </div>
    </section>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="row g-4">
                        <div class="col-lg-6 text-center"><img id="mImg" src="" alt="" class="img-fluid"></div>
                        <div class="col-lg-6">
                            <h2 id="mTitle" class="fw-bold mb-3"></h2>
                            <div id="mSpecs" class="mb-4"></div>
                            <h3 id="mPrice" class="accent-color fw-bold"></h3>
                            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-3" id="mAddBtn">AÑADIR AL ARSENAL</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end bg-dark text-white" id="cart">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="fw-bold m-0">TU ARSENAL</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cItems"></div>
            <div class="mt-auto pt-4 border-top">
                <div class="d-flex justify-content-between fs-3 fw-bold mb-4"><span>Total</span><span id="cTotal">S/ 0</span></div>
                <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="sendWsp()">PEDIR POR WHATSAPP</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const prods = [
            { 
                id: 1, name: "SteelSeries Apex 7 TKL", price: 79.0, img: "teclado con ia 2.jpg", 
                specs: { "Switches": "Mechanical Brown", "Pantalla": "OLED Smart", "Medidas": "355x139x40mm" } 
            },
            { 
                id: 2, name: "Pad Gamer Pro XL", price: 23.9, img: "OIG1.mS84ueUDNMUBORVH4k.jpg", 
                specs: { "Diseño": "Wave Neon Edition", "Medidas": "900 x 400 x 4 mm", "Bordes": "Costura Reforzada" } 
            },
            { 
                id: 3, name: "Mouse Gaming Pro", price: 69.9, img: "OIG4.jpg", 
                specs: { "Sensor": "Hero 25K DPI", "Peso": "63g Superlight", "Conexión": "Wireless Lightspeed" } 
            },
            { 
                id: 4, name: "Monitor 240Hz OLED", price: 459.9, img: "OIG3.jpg", 
                specs: { "Modelo": "Odyssey OLED G8", "Frecuencia": "240Hz", "Respuesta": "0.03ms GtG" } 
            }
        ];

        let myCart = [];

        function render() {
            document.getElementById('pGrid').innerHTML = prods.map(p => `
                <div class="col-md-6 col-lg-3">
                    <div class="product-card text-center" onclick="openDetails(${p.id})">
                        <div class="img-box"><img src="${p.img}"></div>
                        <h4 class="fw-bold mb-1">${p.name}</h4>
                        <p class="accent-color fs-4 fw-bold mb-2">S/ ${p.price.toFixed(2)}</p>
                        <small class="text-secondary">Click para detalles</small>
                    </div>
                </div>
            `).join('');
        }

        function openDetails(id) {
            const p = prods.find(x => x.id === id);
            document.getElementById('mTitle').innerText = p.name;
            document.getElementById('mImg').src = p.img;
            document.getElementById('mPrice').innerText = `S/ ${p.price.toFixed(2)}`;
            let h = ''; for(let s in p.specs) h += `<div class="spec-item"><div class="spec-label">${s}</div><div>${p.specs[s]}</div></div>`;
            document.getElementById('mSpecs').innerHTML = h;
            document.getElementById('mAddBtn').onclick = () => { add(p.id); bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); };
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }

        function add(id) { myCart.push(prods.find(x => x.id === id)); update(); }
        function update() {
            document.getElementById('cCount').innerText = myCart.length;
            document.getElementById('cItems').innerHTML = myCart.map((p, i) => `<div class="d-flex justify-content-between mb-2 p-2 bg-secondary bg-opacity-10 rounded-3"><span>${p.name}</span><button class="btn btn-sm btn-danger" onclick="myCart.splice(${i},1);update()">×</button></div>`).join('');
            document.getElementById('cTotal').innerText = `S/ ${myCart.reduce((s, p) => s + p.price, 0).toFixed(2)}`;
        }

        function sendWsp() {
            if(!myCart.length) return alert("Selecciona armamento primero");
            let m = "¡Hola ELMAQUI TECH! Quiero estos productos:%0A";
            myCart.forEach(p => m += `• ${p.name}%0A`);
            window.open(`https://wa.me/51933589431?text=${m}%0ATOTAL: ${document.getElementById('cTotal').innerText}`);
        }

        render();
    </script>
</body>
</html>
