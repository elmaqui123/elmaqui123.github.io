<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMAQUI TECH | Tienda Global</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --accent: #00c8ff; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Hero Gigante */
        .hero { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2000');
            background-size: cover; background-attachment: fixed;
        }

        /* Tarjetas Estilo Gamer */
        .card-gamer {
            background: #111; border: 1px solid #222; border-radius: 20px;
            padding: 25px; transition: 0.4s; position: relative; overflow: hidden;
        }
        .card-gamer:hover {
            border-color: var(--accent); transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.2);
        }
        .img-prod { height: 200px; object-fit: contain; width: 100%; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }

        /* Botón WhatsApp Flotante */
        .btn-wsp {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 30px;
            color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000;
            text-decoration: none; transition: 0.3s;
        }
        .btn-wsp:hover { transform: scale(1.1); color: white; }

        .cart-badge { background: var(--accent); position: absolute; top: -5px; right: -5px; padding: 2px 8px; border-radius: 50px; font-size: 12px; }
    </style>
</head>
<body>

    <a href="https://wa.me/51999999999?text=Hola%20ElMaqui,%20quiero%20comprar%20hardware" class="btn-wsp" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav class="navbar navbar-dark bg-dark sticky-top border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold fs-2" href="#">ELMAQUI <span style="color:var(--accent)">TECH</span></a>
            <button class="btn btn-outline-info position-relative" data-bs-toggle="offcanvas" data-bs-target="#cart">
                <i class="fa fa-shopping-cart"></i>
                <span id="cartCount" class="cart-badge">0</span>
            </button>
        </div>
    </nav>

    <section class="hero text-center">
        <div data-aos="zoom-in">
            <h1 class="display-1 fw-bold">DOMINA EL JUEGO</h1>
            <p class="fs-4 text-info">Todo el hardware que tu setup necesita</p>
            <a href="#productos" class="btn btn-info rounded-pill px-5 py-3 mt-4 fw-bold">VER CATÁLOGO</a>
        </div>
    </section>

    <div class="container py-5" id="productos">
        <div class="row g-4" id="grid"></div>
    </div>

    <div class="offcanvas offcanvas-end bg-dark text-white" id="cart">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="fw-bold">LISTA DE COMPRA</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cartItems"></div>
            <div class="mt-auto">
                <hr>
                <h3 class="d-flex justify-content-between">Total: <span>S/ <span id="total">0</span></span></h3>
                <button class="btn btn-info w-100 py-3 mt-3 fw-bold" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        AOS.init();
        
        const products = [
            { id: 1, name: "NVIDIA RTX 4090", price: 6800, img: "https://images.unsplash.com/photo-1591488320449-011701bb6704?q=80&w=400" },
            { id: 2, name: "Teclado RGB Mecánico", price: 420, img: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?q=80&w=400" },
            { id: 3, name: "Mouse Gamer Pro", price: 290, img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=400" },
            { id: 4, name: "Monitor 240Hz OLED", price: 3400, img: "https://images.unsplash.com/photo-1593305841991-05c297ba4575?q=80&w=400" }
        ];

        let cart = [];

        function render() {
            document.getElementById('grid').innerHTML = products.map(p => `
                <div class="col-md-6 col-lg-3" data-aos="fade-up">
                    <div class="card-gamer text-center">
                        <img src="${p.img}" class="img-prod mb-3">
                        <h5 class="fw-bold">${p.name}</h5>
                        <p class="text-info fs-4">S/ ${p.price}</p>
                        <button class="btn btn-outline-info w-100 rounded-pill" onclick="add(${p.id})">Añadir</button>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            cart.push(products.find(p => p.id === id));
            update();
        }

        function update() {
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('cartItems').innerHTML = cart.map((p, i) => `
                <div class="d-flex justify-content-between align-items-center mb-3 p-2 bg-secondary bg-opacity-25 rounded">
                    <span>${p.name}</span>
                    <div>
                        <span class="me-2">S/ ${p.price}</span>
                        <button class="btn btn-sm btn-danger" onclick="cart.splice(${i},1);update()">X</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('total').innerText = cart.reduce((s, p) => s + p.price, 0);
        }

        function enviarWhatsApp() {
            if(cart.length === 0) return alert("El carrito está vacío");
            let msg = "Hola ELMAQUI, quiero estos productos:%0A";
            cart.forEach(p => msg += `- ${p.name} (S/ ${p.price})%0A`);
            msg += `%0ATotal: S/ ${document.getElementById('total').innerText}`;
            window.open(`https://wa.me/51999999999?text=${msg}`);
        }

        render();
    </script>
</body>
</html>
